services:
  - type: web
    name: opportunity-hub
    env: node
    plan: free
    buildCommand: "cd dashboard && npm install && npm run build && cd backend && npm install && npx puppeteer browsers install chrome"
    startCommand: "cd dashboard/backend && node server.js"
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/dashboard/backend/.puppeteer-cache
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "false"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User to provide MySQL URL
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://opportunity-hub.onrender.com # Update after first deploy
      - key: PORT
        value: 10000
